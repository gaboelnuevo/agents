# Reference stack for processes on the host. Copy to `config/local.yaml` and set project.id + secrets.
# Redis: run `docker compose -f docker-compose-with-redis.yml up -d redis` in this directory, or use your own instance.
environment: local

server:
  port: 3010
  host: "0.0.0.0"

project:
  id: default

redis:
  url: "redis://127.0.0.1:6379"

bullmq:
  # Omit or set to "" to use the library default queue name.
  queueName: ""

definitions:
  keyPrefix: def

run:
  waitTimeoutMs: 60000

# Worker: adapters for agent.llm.provider (openai | anthropic). Set keys via env (${…}).
llm:
  defaultProvider: openai
  openai:
    apiKey: "${OPENAI_API_KEY}"
    # Empty = api.openai.com. Non-empty = OpenAI-compatible base (applies to all openai agents, including planner sub-agents).
    baseUrl: ""
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    baseUrl: ""

# Optional — vector tools (`system_vector_*`) on Redis Stack + OpenAI embeddings.
# Requires Redis Stack/RediSearch (see docker-compose-with-redis.yml).
# vector:
#   enabled: true
#   openai:
#     embeddingModel: text-embedding-3-small
#   indexPrefix: vecidx:
#   keyPrefix: vecdoc:
#   distanceMetric: COSINE # COSINE | L2 | IP
#   queryExpansionFactor: 5

# Optional — planner: seed Redis agent `planner` on API/worker boot if missing; sub-agent defaults for spawn_agent.
# planner:
#   defaultAgent:
#     enabled: true
#     id: planner
#     llm:
#       provider: auto
#       model: auto
#       temperature: 0.2
#   subAgent:
#     provider: auto
#     model: auto
#     temperature: 0.2

# OpenClaw: default in code is ./skills (relative to stack file); for local.yaml under config/, ../skills is apps/runtime/skills.
openclaw:
  enabled: true
  skillsDirs:
    - ../skills

# Optional — POST /v1/chat (lazy-seeded `chat` agent) + SSE planner notifications for that chat session.
# chat:
#   defaultAgent:
#     enabled: true
#     id: chat
#     llm: { provider: auto, model: auto, temperature: 0.2 }
# runEvents:
#   redis: true
