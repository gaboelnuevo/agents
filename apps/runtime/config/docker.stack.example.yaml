# Copy to `docker.stack.yaml` (gitignored), edit, then `docker compose … up`. Compose mounts that file into the API and worker.
# Only placeholders (${OPENAI_API_KEY}, etc.) — never commit real secrets in your copy.
environment: local

server:
  port: 3010
  host: "0.0.0.0"

project:
  # Isolates Redis definition keys, memory prefixes, and dispatch scope. Set explicitly per deployment.
  id: default

redis:
  url: "redis://redis:6379"

bullmq:
  queueName: ""

definitions:
  keyPrefix: def

run:
  waitTimeoutMs: 60000

llm:
  defaultProvider: openai
  openai:
    apiKey: "${OPENAI_API_KEY}"
    # Non-empty = OpenAI-compatible base; applies to all openai agents including planner sub-agents.
    baseUrl: ""
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    baseUrl: ""

# Optional — default `planner` agent in Redis on boot + spawn_agent defaults (`enabled: false` to skip seed).
# planner:
#   defaultAgent:
#     enabled: true
#     id: planner
#   subAgent:
#     provider: auto
#     model: auto

# Worker image must include these paths (or mount volumes). See apps/runtime/docs/configuration.md § OpenClaw.
openclaw:
  enabled: true
  skillsDirs:
    - ./skills

# Optional local artifact storage for planner/chat outputs.
# Docker Compose mounts ./artifacts from the host into this relative path.
# artifacts:
#   enabled: true
#   rootDir: ./artifacts
#   publicBaseUrl: /artifacts
